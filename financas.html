
<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Controlo Financeiro</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel (Para converter o JSX diretamente no navegador) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { -webkit-tap-highlight-color: transparent; }
    /* Animação suave para os modais */
    @keyframes slideUp {
      from { transform: translateY(100%); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes popIn {
      0% { transform: translate(-50%, -100%); opacity: 0; }
      100% { transform: translate(-50%, 0); opacity: 1; }
    }
    .modal-anim { animation: slideUp 0.3s ease-out forwards; }
    .toast-anim { animation: popIn 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards; }
  </style>
</head>
<body class="bg-gray-100 text-gray-800 antialiased selection:bg-blue-200">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;

    // --- ÍCONES (SVG Inline para não depender de pacotes externos) ---
    const IconPlus = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>;
    const IconDownload = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>;
    const IconUpload = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>;
    const IconChevronDown = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="6 9 12 15 18 9"></polyline></svg>;
    const IconChevronUp = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="18 15 12 9 6 15"></polyline></svg>;
    const IconAlert = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>;
    const IconTrash = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>;
    const IconX = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>;
    const IconDollar = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>;
    const IconTrendingUp = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline><polyline points="17 6 23 6 23 12"></polyline></svg>;
    const IconTrendingDown = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="23 18 13.5 8.5 8.5 13.5 1 6"></polyline><polyline points="17 18 23 18 23 12"></polyline></svg>;

    // --- CONFIGURAÇÕES BÁSICAS ---
    const MONTHS = ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun', 'Jul', 'Ago', 'Set', 'Out', 'Nov', 'Dez'];
    const CURRENT_YEAR = new Date().getFullYear();
    const CURRENT_MONTH = new Date().getMonth();

    const formatMoney = (val) => new Intl.NumberFormat('pt-PT', { style: 'currency', currency: 'EUR' }).format(val);
    
    // Melhorada a geração de ID para evitar conflitos no futuro
    const generateId = () => crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).substring(2, 15);

    // --- COMPONENTE PRINCIPAL ---
    function App() {
      // 1. Estado de Dados
      const [data, setData] = useState(() => {
        const saved = localStorage.getItem('finances_simple_data_pt');
        if (saved) return JSON.parse(saved);
        return { year: CURRENT_YEAR, items: [] };
      });

      // 2. Estado de Interface e Referências
      const [expandedMonths, setExpandedMonths] = useState(new Set([CURRENT_MONTH]));
      const [modalState, setModalState] = useState({ isOpen: false, item: null });
      const [confirmDelete, setConfirmDelete] = useState(false);
      const [showClearConfirm, setShowClearConfirm] = useState(false); // Modal para limpar tudo
      const [toast, setToast] = useState(null); // Sistema de notificações
      
      const fileInputRef = useRef(null);

      // Função para mostrar notificações breves
      const showToast = (message, type = 'success') => {
        setToast({ message, type });
        setTimeout(() => setToast(null), 3500);
      };

      // 3. Persistência Automática
      useEffect(() => {
        localStorage.setItem('finances_simple_data_pt', JSON.stringify(data));
      }, [data]);

      // 4. Cálculos Instantâneos
      const stats = useMemo(() => {
        let totalIncome = 0;
        let totalExpense = 0;
        const monthly = Array(12).fill(null).map(() => ({ income: 0, expense: 0, items: [] }));

        data.items.forEach(item => {
          if (item.type === 'income') {
            totalIncome += item.value;
            monthly[item.month].income += item.value;
          } else {
            totalExpense += item.value;
            monthly[item.month].expense += item.value;
          }
          monthly[item.month].items.push(item);
        });

        const balance = totalIncome - totalExpense;

        let prevExpenseSum = 0;
        let prevMonthsCount = 0;
        for (let i = 0; i < CURRENT_MONTH; i++) {
          if (monthly[i].expense > 0 || monthly[i].income > 0) {
            prevExpenseSum += monthly[i].expense;
            prevMonthsCount++;
          }
        }
        const avgPrevExpense = prevMonthsCount > 0 ? prevExpenseSum / prevMonthsCount : 0;
        const isSpendingMoreThanAvg = prevMonthsCount > 0 && monthly[CURRENT_MONTH].expense > avgPrevExpense;

        return { totalIncome, totalExpense, balance, monthly, isSpendingMoreThanAvg, avgPrevExpense };
      }, [data]);

      // 5. Funções de Ação
      const handleSaveItem = (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        
        let valorInput = formData.get('value').replace(',', '.');
        
        const newItem = {
          id: modalState.item?.id || generateId(),
          name: formData.get('name'),
          value: parseFloat(valorInput),
          type: formData.get('type'),
          month: parseInt(formData.get('month')),
          year: data.year
        };

        setData(prev => {
          const filtered = prev.items.filter(i => i.id !== newItem.id);
          return { ...prev, items: [...filtered, newItem] };
        });
        
        setExpandedMonths(prev => new Set([...prev, newItem.month]));
        closeModal();
        showToast('Registo guardado com sucesso.');
      };

      const handleDeleteItem = (id) => {
        setData(prev => ({ ...prev, items: prev.items.filter(i => i.id !== id) }));
        closeModal();
        showToast('Registo eliminado.');
      };

      // --- NOVAS FUNÇÕES ---
      
      // Exportar (Download Backup)
      const downloadBackup = () => {
        if(data.items.length === 0) {
          showToast('Não há dados para exportar.', 'error');
          return;
        }
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `backup_financeiro_${data.year}.json`;
        a.click();
        URL.revokeObjectURL(url);
        showToast('Backup exportado com sucesso!');
      };

      // Importar Backup
      const handleImportJson = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const importedData = JSON.parse(event.target.result);
            
            // Validação de segurança para garantir que o JSON tem a estrutura correta
            if (importedData.year && Array.isArray(importedData.items)) {
              setData(importedData);
              
              // Expande os meses que contêm dados importados
              const newExpanded = new Set([CURRENT_MONTH]);
              importedData.items.forEach(item => newExpanded.add(item.month));
              setExpandedMonths(newExpanded);
              
              showToast('Dados importados com sucesso!');
            } else {
              showToast('Ficheiro inválido. Estrutura não reconhecida.', 'error');
            }
          } catch (error) {
            showToast('Erro ao ler ficheiro. Certifique-se que é um JSON válido.', 'error');
          }
        };
        reader.readAsText(file);
        
        // Limpa o input para permitir importar o mesmo ficheiro novamente se necessário
        e.target.value = '';
      };

      // Limpar Tudo
      const handleResetData = () => {
        setData({ year: CURRENT_YEAR, items: [] });
        setShowClearConfirm(false);
        showToast('Todos os dados foram apagados permanentemente.');
      };

      // ----------------------

      const toggleMonth = (idx) => {
        setExpandedMonths(prev => {
          const newSet = new Set(prev);
          if (newSet.has(idx)) newSet.delete(idx);
          else newSet.add(idx);
          return newSet;
        });
      };

      const openModal = (item = null) => {
        setConfirmDelete(false);
        setModalState({ isOpen: true, item });
      };

      const closeModal = () => setModalState({ isOpen: false, item: null });

      return (
        <div className="min-h-screen bg-gray-100 pb-24 font-sans text-gray-800 relative">
          
          {/* TOAST NOTIFICATION */}
          {toast && (
            <div className={`fixed top-6 left-1/2 -translate-x-1/2 z-[100] px-5 py-3 rounded-full shadow-lg text-sm font-semibold text-white flex items-center gap-2 toast-anim ${toast.type === 'error' ? 'bg-red-600' : 'bg-gray-900'}`}>
              {toast.type === 'error' ? <IconAlert size={18} /> : <IconDollar size={18} />}
              {toast.message}
            </div>
          )}

          {/* CABEÇALHO */}
          <header className="bg-white px-4 py-4 shadow-sm sticky top-0 z-10">
            <div className="max-w-xl mx-auto flex justify-between items-center">
              <h1 className="text-xl font-bold text-gray-900 flex items-center gap-2">
                <IconDollar className="text-emerald-500" />
                Finanças {data.year}
              </h1>
              
              {/* Barra de Ações */}
              <div className="flex items-center gap-2">
                {/* Input escondido para importar arquivo */}
                <input 
                  type="file" 
                  accept=".json" 
                  ref={fileInputRef} 
                  onChange={handleImportJson} 
                  className="hidden" 
                />
                
                <button 
                  onClick={() => fileInputRef.current.click()}
                  title="Importar Backup"
                  className="p-2 bg-gray-100 hover:bg-gray-200 rounded-lg text-gray-600 transition-colors"
                >
                  <IconUpload size={18} />
                </button>
                
                <button 
                  onClick={downloadBackup}
                  title="Exportar Backup"
                  className="p-2 bg-gray-100 hover:bg-gray-200 rounded-lg text-gray-600 transition-colors"
                >
                  <IconDownload size={18} />
                </button>
                
                <div className="w-px h-6 bg-gray-200 mx-1"></div> {/* Divisor */}

                <button 
                  onClick={() => setShowClearConfirm(true)}
                  title="Eliminar Todos os Dados"
                  disabled={data.items.length === 0}
                  className="p-2 bg-red-50 hover:bg-red-100 text-red-600 rounded-lg transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
                >
                  <IconTrash size={18} />
                </button>
              </div>
            </div>
          </header>

          <main className="max-w-xl mx-auto px-4 mt-6 space-y-6">
            {/* RESUMO GERAL */}
            <div className="bg-white rounded-2xl shadow-sm p-5 border border-gray-100">
              <div className="text-center mb-4">
                <p className="text-sm font-medium text-gray-500 uppercase tracking-wide">Saldo Anual</p>
                <p className={`text-3xl font-black mt-1 ${stats.balance < 0 ? 'text-red-500' : 'text-gray-900'}`}>
                  {formatMoney(stats.balance)}
                </p>
              </div>
              <div className="grid grid-cols-2 gap-4 mt-6 pt-4 border-t border-gray-100">
                <div>
                  <p className="text-xs text-gray-400 font-medium flex items-center gap-1">
                    <IconTrendingUp size={14} className="text-emerald-500"/> Receitas
                  </p>
                  <p className="text-lg font-bold text-emerald-600">{formatMoney(stats.totalIncome)}</p>
                </div>
                <div>
                  <p className="text-xs text-gray-400 font-medium flex items-center gap-1">
                    <IconTrendingDown size={14} className="text-red-500"/> Gastos
                  </p>
                  <p className="text-lg font-bold text-red-600">{formatMoney(stats.totalExpense)}</p>
                </div>
              </div>
            </div>

            {/* ALERTA INTELIGENTE */}
            {stats.isSpendingMoreThanAvg && (
              <div className="bg-amber-50 border border-amber-200 rounded-xl p-4 flex gap-3 text-amber-800">
                <IconAlert className="shrink-0 mt-0.5 text-amber-600" size={20} />
                <div className="text-sm leading-relaxed">
                  <strong>Atenção ao ritmo:</strong> Os seus gastos este mês ({formatMoney(stats.monthly[CURRENT_MONTH].expense)}) 
                  já superam a sua média mensal anterior ({formatMoney(stats.avgPrevExpense)}).
                </div>
              </div>
            )}

            {/* GRÁFICO LEVE (SVG NATIVO) */}
            <div className="bg-white rounded-2xl shadow-sm p-5 border border-gray-100">
              <p className="text-sm font-medium text-gray-500 mb-4">Visão Geral Mensal</p>
              <div className="h-32 w-full flex items-end justify-between gap-1">
                {stats.monthly.map((m, i) => {
                  const maxVal = Math.max(...stats.monthly.map(x => Math.max(x.income, x.expense)), 1);
                  const incHeight = (m.income / maxVal) * 100;
                  const expHeight = (m.expense / maxVal) * 100;
                  const isCurrent = i === CURRENT_MONTH;

                  return (
                    <div key={i} className={`flex-1 flex flex-col justify-end items-center group relative h-full ${isCurrent ? 'bg-gray-50 rounded-t-md' : ''}`}>
                      <div className="w-full flex justify-center items-end gap-0.5 h-[80%] mb-2">
                        <div className="w-[40%] bg-emerald-400 rounded-t-sm transition-all" style={{ height: `${incHeight}%`, minHeight: m.income > 0 ? '4px' : '0' }}></div>
                        <div className="w-[40%] bg-red-400 rounded-t-sm transition-all" style={{ height: `${expHeight}%`, minHeight: m.expense > 0 ? '4px' : '0' }}></div>
                      </div>
                      <span className={`text-[10px] ${isCurrent ? 'font-bold text-gray-800' : 'text-gray-400'}`}>{MONTHS[i]}</span>
                    </div>
                  );
                })}
              </div>
            </div>

            {/* LISTA DE MESES */}
            <div className="space-y-3">
              {MONTHS.map((monthName, idx) => {
                const mData = stats.monthly[idx];
                const isExpanded = expandedMonths.has(idx);
                const hasItems = mData.items.length > 0;
                const warningBalance = mData.expense > mData.income && mData.income > 0;

                return (
                  <div key={idx} className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                    <button 
                      onClick={() => toggleMonth(idx)}
                      className="w-full px-4 py-4 flex items-center justify-between bg-white hover:bg-gray-50 transition-colors"
                    >
                      <div className="flex items-center gap-3">
                        <div className={`w-10 h-10 rounded-full flex items-center justify-center text-sm font-bold ${idx === CURRENT_MONTH ? 'bg-blue-100 text-blue-700' : 'bg-gray-100 text-gray-600'}`}>
                          {monthName}
                        </div>
                        <div className="text-left">
                          <p className="font-semibold text-gray-900 leading-tight">
                            {formatMoney(mData.expense)} <span className="text-xs font-normal text-gray-500">gastos</span>
                          </p>
                          {warningBalance && <span className="text-[10px] font-bold text-red-500 uppercase tracking-wider">Acima da receita</span>}
                        </div>
                      </div>
                      <div className="flex items-center gap-2 text-gray-400">
                        <span className="text-xs font-medium">{hasItems ? `${mData.items.length} itens` : ''}</span>
                        {isExpanded ? <IconChevronUp size={18} /> : <IconChevronDown size={18} />}
                      </div>
                    </button>

                    {isExpanded && (
                      <div className="bg-gray-50 border-t border-gray-100 p-0">
                        {!hasItems ? (
                          <p className="text-center text-sm text-gray-400 py-6">Nenhum registo em {monthName}.</p>
                        ) : (
                          <ul className="divide-y divide-gray-100">
                            {mData.items.sort((a,b) => b.value - a.value).map(item => (
                              <li 
                                key={item.id} 
                                onClick={() => openModal(item)}
                                className="px-4 py-3 flex justify-between items-center cursor-pointer hover:bg-gray-100 active:bg-gray-200 transition-colors"
                              >
                                <div className="flex items-center gap-2 truncate pr-4">
                                  <span className={`w-2 h-2 rounded-full flex-shrink-0 ${item.type === 'income' ? 'bg-emerald-500' : 'bg-red-500'}`}></span>
                                  <span className="text-gray-800 font-medium truncate text-sm">{item.name}</span>
                                </div>
                                <span className={`font-semibold text-sm ${item.type === 'income' ? 'text-emerald-600' : 'text-gray-900'}`}>
                                  {item.type === 'expense' ? '- ' : '+ '}{formatMoney(item.value)}
                                </span>
                              </li>
                            ))}
                          </ul>
                        )}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </main>

          {/* BOTÃO FLUTUANTE (FAB) */}
          <button 
            onClick={() => openModal()}
            className="fixed bottom-6 right-6 w-14 h-14 bg-blue-600 hover:bg-blue-700 text-white rounded-full shadow-lg hover:shadow-xl flex items-center justify-center transition-all z-20 active:scale-95"
          >
            <IconPlus size={28} />
          </button>

          {/* MODAL ADICIONAR / EDITAR */}
          {modalState.isOpen && (
            <div className="fixed inset-0 bg-black/60 z-50 flex items-end sm:items-center justify-center p-0 sm:p-4">
              <div className="bg-white w-full sm:max-w-sm rounded-t-2xl sm:rounded-2xl p-6 modal-anim shadow-2xl">
                
                <div className="flex justify-between items-center mb-6">
                  <h2 className="text-xl font-bold text-gray-900">
                    {modalState.item ? 'Editar Registo' : 'Novo Registo'}
                  </h2>
                  <button onClick={closeModal} className="p-2 -mr-2 text-gray-400 hover:bg-gray-100 rounded-full transition-colors">
                    <IconX size={20} />
                  </button>
                </div>

                <form onSubmit={handleSaveItem} className="space-y-4">
                  {/* TIPO */}
                  <div className="flex gap-2 p-1 bg-gray-100 rounded-lg">
                    <label className="flex-1 cursor-pointer">
                      <input type="radio" name="type" value="expense" defaultChecked={modalState.item?.type !== 'income'} className="peer sr-only" />
                      <div className="text-center py-2 text-sm font-medium rounded-md text-gray-500 peer-checked:bg-white peer-checked:text-red-600 peer-checked:shadow-sm transition-all">
                        Gasto
                      </div>
                    </label>
                    <label className="flex-1 cursor-pointer">
                      <input type="radio" name="type" value="income" defaultChecked={modalState.item?.type === 'income'} className="peer sr-only" />
                      <div className="text-center py-2 text-sm font-medium rounded-md text-gray-500 peer-checked:bg-white peer-checked:text-emerald-600 peer-checked:shadow-sm transition-all">
                        Receita
                      </div>
                    </label>
                  </div>

                  <div>
                    <label className="block text-xs font-semibold text-gray-500 uppercase mb-1">Nome</label>
                    <input 
                      type="text" name="name" required autoFocus
                      defaultValue={modalState.item?.name}
                      placeholder="Ex: Mercado, Salário..."
                      className="w-full border border-gray-300 rounded-xl px-4 py-3 text-base outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all bg-gray-50 focus:bg-white"
                    />
                  </div>

                  <div className="grid grid-cols-2 gap-4">
                    <div>
                      <label className="block text-xs font-semibold text-gray-500 uppercase mb-1">Valor (€)</label>
                      <input 
                        type="number" name="value" required step="0.01" min="0"
                        defaultValue={modalState.item?.value}
                        placeholder="0.00"
                        className="w-full border border-gray-300 rounded-xl px-4 py-3 text-base outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all bg-gray-50 focus:bg-white font-semibold"
                      />
                    </div>
                    <div>
                      <label className="block text-xs font-semibold text-gray-500 uppercase mb-1">Mês</label>
                      <select 
                        name="month" 
                        defaultValue={modalState.item?.month ?? CURRENT_MONTH}
                        className="w-full border border-gray-300 rounded-xl px-4 py-3 text-base outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 bg-gray-50 focus:bg-white appearance-none"
                      >
                        {MONTHS.map((m, i) => <option key={i} value={i}>{m}</option>)}
                      </select>
                    </div>
                  </div>

                  <div className="pt-4 flex gap-3">
                    {modalState.item && (
                      <button 
                        type="button" 
                        onClick={() => {
                          if(!confirmDelete) setConfirmDelete(true);
                          else handleDeleteItem(modalState.item.id);
                        }}
                        className={`px-4 py-3 rounded-xl transition-all flex items-center justify-center font-semibold text-sm
                          ${confirmDelete ? 'bg-red-600 text-white flex-1' : 'bg-red-50 text-red-600 hover:bg-red-100'}`}
                      >
                        {confirmDelete ? 'Eliminar Definitivamente?' : <IconTrash size={20} />}
                      </button>
                    )}
                    
                    {(!confirmDelete || !modalState.item) && (
                      <button 
                        type="submit" 
                        className="flex-1 bg-blue-600 text-white font-bold py-3 px-4 rounded-xl hover:bg-blue-700 active:bg-blue-800 transition-colors shadow-sm"
                      >
                        Guardar
                      </button>
                    )}
                  </div>
                </form>
              </div>
            </div>
          )}

          {/* MODAL DE CONFIRMAÇÃO PARA APAGAR TUDO */}
          {showClearConfirm && (
            <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4">
              <div className="bg-white w-full max-w-sm rounded-2xl p-6 modal-anim shadow-2xl">
                <div className="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-red-100 mb-4">
                  <IconAlert className="h-6 w-6 text-red-600" />
                </div>
                <h3 className="text-lg font-bold text-gray-900 text-center mb-2">Eliminar todos os dados?</h3>
                <p className="text-gray-500 text-sm text-center mb-6">
                  Esta ação não pode ser desfeita. Todos os seus registos financeiros serão apagados permanentemente.
                </p>
                <div className="flex gap-3">
                  <button 
                    onClick={() => setShowClearConfirm(false)}
                    className="flex-1 py-3 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-xl font-semibold transition-colors"
                  >
                    Cancelar
                  </button>
                  <button 
                    onClick={handleResetData}
                    className="flex-1 py-3 bg-red-600 hover:bg-red-700 text-white rounded-xl font-bold transition-colors"
                  >
                    Sim, Eliminar
                  </button>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    // Renderizar a App
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
