<!DOCTYPE html>
<html lang="pt-PT" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <!-- Define a cor da barra de status do telemóvel para preto matte -->
  <meta name="theme-color" content="#09090b">
  <title>Hub Profissional</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Configuração Tailwind idêntica ao Foco Ifes -->
  <script>
      tailwind.config = {
          darkMode: 'class',
          theme: {
              extend: {
                  fontFamily: { sans: ['Inter', 'sans-serif'] },
                  colors: { 
                      matte: {
                          bg: '#09090b',
                          card: '#18181b',
                          border: '#27272a',
                          hover: '#27272a',
                          text: '#fafafa',
                          muted: '#a1a1aa'
                      }
                  }
              }
          }
      }
  </script>

  <style>
    body, html { 
      margin: 0; 
      padding: 0; 
      overflow: hidden; 
      background-color: #09090b;
      -webkit-tap-highlight-color: transparent;
    }

    /* Altura segura para mobile */
    .h-screen-dvh {
      height: 100vh;
      height: 100dvh;
    }

    /* Padding para o "Home Indicator" (risca inferior do iPhone) */
    .pb-safe { padding-bottom: env(safe-area-inset-bottom, 12px); }
    .pt-safe { padding-top: env(safe-area-inset-top, 0px); }

    /* --- ESTILOS DOS BOTÕES DA NAVBAR --- */
    .nav-btn {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .nav-btn i {
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), color 0.3s ease;
    }

    /* Estado Ativo (O que está selecionado) */
    .nav-btn.active-nav {
      background-color: rgba(255, 255, 255, 0.04);
      color: #fafafa;
    }
    
    .nav-btn.active-nav i {
      transform: translateY(-2px) scale(1.15);
      color: #ffffff;
    }

    /* --- ANIMAÇÕES DO IFRAME (Blur, Slide & Scale) --- */
    #app-frame { 
      transition: opacity 0.4s ease, transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), filter 0.4s ease; 
      transform-origin: center;
    }
    .frame-loading { 
      opacity: 0; 
      transform: scale(0.98) translateY(10px); 
      filter: blur(4px); 
    }
    .frame-ready { 
      opacity: 1; 
      transform: scale(1) translateY(0); 
      filter: blur(0px); 
    }

    /* --- NOVO LOADER --- */
    .loader {
      --color-1: #fff;
      --size: 1px;
      width: calc(48 * var(--size));
      height: calc(48 * var(--size));
      border-radius: 50%;
      display: inline-block;
      border-top: calc(3 * var(--size)) solid var(--color-1);
      border-right: calc(3 * var(--size)) solid transparent;
      box-sizing: border-box;
      animation: rotation 1s linear infinite;
    }

    @keyframes rotation {
      0% {
        transform: rotate(0deg);
      }
      100% {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body class="flex flex-col-reverse sm:flex-col h-screen-dvh bg-matte-bg text-matte-text antialiased">

  <!-- ================= NAVBAR (BARRA PRETA PREMIUM) ================= -->
  <nav class="bg-matte-bg/95 backdrop-blur-md border-t sm:border-t-0 sm:border-b border-white/[0.04] z-50 flex-shrink-0 pb-safe pt-safe shadow-[0_-10px_30px_rgba(0,0,0,0.5)] sm:shadow-none">
    <div class="max-w-5xl mx-auto px-2 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-[72px] sm:h-[70px]">
        
        <!-- Logótipo / Título (Desktop) -->
        <div class="hidden sm:flex items-center gap-3">
          <div class="bg-white/[0.04] border border-white/[0.05] p-2 rounded-xl text-white">
            <i class="ph-fill ph-squares-four text-xl"></i>
          </div>
          <div class="flex flex-col">
            <span class="font-bold text-lg tracking-tight text-white leading-none">Nexus<span class="text-matte-muted font-medium">OS</span></span>
            <span class="text-[10px] text-matte-muted tracking-wide mt-1 uppercase font-semibold">Workspace</span>
          </div>
        </div>
        
        <!-- Botões de Navegação -->
        <div class="flex w-full sm:w-auto justify-around sm:justify-end sm:gap-2 h-full items-center px-1 sm:px-0">
          
          <button onclick="loadApp('gestao.html', this)" class="nav-btn active-nav flex-1 sm:flex-none flex flex-col sm:flex-row items-center justify-center gap-1.5 sm:gap-2.5 py-2 sm:px-5 sm:py-2.5 rounded-xl text-[11px] sm:text-sm font-medium text-matte-muted hover:text-white hover:bg-white/[0.02]">
            <i class="ph-fill ph-users text-[24px] sm:text-[20px]"></i> 
            <span class="tracking-wide">Gestão</span>
          </button>
          
          <button onclick="loadApp('financas.html', this)" class="nav-btn flex-1 sm:flex-none flex flex-col sm:flex-row items-center justify-center gap-1.5 sm:gap-2.5 py-2 sm:px-5 sm:py-2.5 rounded-xl text-[11px] sm:text-sm font-medium text-matte-muted hover:text-white hover:bg-white/[0.02]">
            <i class="ph-fill ph-currency-dollar text-[24px] sm:text-[20px]"></i> 
            <span class="tracking-wide">Finanças</span>
          </button>
          
          <button onclick="loadApp('foco.html', this)" class="nav-btn flex-1 sm:flex-none flex flex-col sm:flex-row items-center justify-center gap-1.5 sm:gap-2.5 py-2 sm:px-5 sm:py-2.5 rounded-xl text-[11px] sm:text-sm font-medium text-matte-muted hover:text-white hover:bg-white/[0.02]">
            <i class="ph-fill ph-student text-[24px] sm:text-[20px]"></i> 
            <span class="tracking-wide">Foco TADS</span>
          </button>
          
        </div>
      </div>
    </div>
  </nav>

  <!-- ================= ÁREA DE CONTEÚDO ================= -->
  <main class="flex-1 relative w-full h-full overflow-hidden bg-matte-bg">
    
    <!-- Loader Premium (Spinner Elegante) -->
    <div id="loader" class="absolute inset-0 flex flex-col items-center justify-center bg-matte-bg z-20 transition-opacity duration-300">
      <div class="loader mb-4"></div>
      <p class="text-matte-muted font-semibold text-[10px] tracking-[0.2em] uppercase">A carregar</p>
    </div>
    
    <!-- Iframe -->
    <iframe 
      id="app-frame" 
      src="gestao.html" 
      class="w-full h-full border-none relative z-10 frame-loading" 
      title="Hub Content" 
      onload="handleIframeLoad()">
    </iframe>
    
  </main>

  <script>
    /**
     * Alternar entre aplicações com transição suave
     */
    function loadApp(file, btn) {
      // Evita recarregar se já estiver na tab atual
      if(btn.classList.contains('active-nav')) return;
      
      const frame = document.getElementById('app-frame');
      const loader = document.getElementById('loader');
      
      // Ativar Loader e iniciar animação de Blur/Fade-out no iframe
      loader.style.opacity = '1';
      loader.style.pointerEvents = 'auto';
      frame.classList.remove('frame-ready');
      frame.classList.add('frame-loading');
      
      // Aguardar o fim da animação de saída antes de mudar o SRC
      setTimeout(() => {
        frame.src = file;
      }, 300); // Ligeiramente mais longo para acompanhar a animação
      
      // Atualizar classes visuais (Remover o ativo de todos)
      document.querySelectorAll('.nav-btn').forEach(b => {
        b.classList.remove('active-nav');
      });
      
      // Ativar o botão clicado
      btn.classList.add('active-nav');
    }

    /**
     * Disparado quando o Iframe termina de carregar o novo ficheiro
     */
    function handleIframeLoad() {
      const frame = document.getElementById('app-frame');
      const loader = document.getElementById('loader');
      
      // Pequeno atraso artificial para a animação ficar fluída
      setTimeout(() => {
        // Desvanecer o loader
        loader.style.opacity = '0';
        loader.style.pointerEvents = 'none';
        
        // Focar e revelar o iframe
        frame.classList.remove('frame-loading');
        frame.classList.add('frame-ready');
      }, 250);
    }
  </script>
</body>
</html>
