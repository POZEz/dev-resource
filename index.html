<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Hub Pessoal - Gestão e Produtividade</title>
  
  <!-- Tailwind CSS para estilização rápida e responsiva -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Ícones Phosphor -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  
  <style>
    /* Prevenir scroll no body para que apenas o iframe role */
    body, html { 
      margin: 0; 
      padding: 0; 
      height: 100%; 
      overflow: hidden; 
      background-color: #f8fafc; 
      font-family: 'Inter', system-ui, sans-serif;
    }
    
    /* Esconder a barra de rolagem da navbar em dispositivos móveis */
    .hide-scroll::-webkit-scrollbar { display: none; }
    .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }

    /* Animação de fade para a transição do iframe */
    #app-frame {
      transition: opacity 0.3s ease;
    }
    .fade-out { opacity: 0; }
    .fade-in { opacity: 1; }
  </style>
</head>
<body class="flex flex-col h-screen text-slate-800">

  <!-- ================= NAVBAR ================= -->
  <nav class="bg-white border-b border-slate-200 shadow-sm z-50 flex-shrink-0">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex flex-col sm:flex-row justify-between h-auto sm:h-16 items-center py-2 sm:py-0">
        
        <!-- Logótipo / Título -->
        <div class="flex items-center gap-2 w-full sm:w-auto justify-center sm:justify-start mb-3 sm:mb-0">
          <div class="bg-blue-600 p-1.5 rounded-lg text-white">
            <i class="ph-fill ph-squares-four text-xl"></i>
          </div>
          <span class="font-bold text-lg tracking-tight">O Meu Hub</span>
        </div>
        
        <!-- Botões de Navegação -->
        <div class="flex space-x-2 items-center overflow-x-auto hide-scroll w-full sm:w-auto justify-start sm:justify-end pb-1 sm:pb-0">
          
          <button onclick="loadApp('gestao.html', this)" class="nav-btn active px-4 py-2 rounded-xl text-sm font-semibold transition-all duration-200 bg-blue-50 text-blue-700 flex items-center gap-2 whitespace-nowrap shadow-sm border border-blue-100">
            <i class="ph-fill ph-users text-lg"></i> 
            Gestão de Visitas
          </button>
          
          <button onclick="loadApp('financas.html', this)" class="nav-btn px-4 py-2 rounded-xl text-sm font-semibold text-slate-500 hover:bg-slate-50 hover:text-slate-900 transition-all duration-200 flex items-center gap-2 whitespace-nowrap border border-transparent">
            <i class="ph-fill ph-currency-dollar text-lg"></i> 
            Finanças
          </button>
          
          <button onclick="loadApp('foco.html', this)" class="nav-btn px-4 py-2 rounded-xl text-sm font-semibold text-slate-500 hover:bg-slate-50 hover:text-slate-900 transition-all duration-200 flex items-center gap-2 whitespace-nowrap border border-transparent">
            <i class="ph-fill ph-student text-lg"></i> 
            Foco TADS
          </button>
          
        </div>
      </div>
    </div>
  </nav>

  <!-- ================= ÁREA DE CONTEÚDO (IFRAME) ================= -->
  <main class="flex-1 w-full relative bg-slate-100">
    
    <!-- Indicador de carregamento -->
    <div id="loader" class="absolute inset-0 flex flex-col items-center justify-center bg-slate-100 z-20">
      <i class="ph ph-spinner-gap animate-spin text-4xl text-blue-600 mb-4"></i>
      <p class="text-slate-500 font-medium text-sm">A carregar aplicação...</p>
    </div>

    <!-- Mensagem de aviso (Aparece se os ficheiros não forem encontrados localmente) -->
    <div id="fallback-msg" class="absolute inset-0 flex-col items-center justify-center bg-white z-0 hidden p-8 text-center">
      <div class="w-16 h-16 bg-amber-100 text-amber-600 rounded-full flex items-center justify-center mb-4 mx-auto">
        <i class="ph-fill ph-warning text-3xl"></i>
      </div>
      <h2 class="text-xl font-bold text-slate-800 mb-2">Aplicação não encontrada</h2>
      <p class="text-slate-500 max-w-md mx-auto">
        Para que o Hub funcione corretamente, certifique-se de que os ficheiros <strong>gestao.html</strong>, <strong>financas.html</strong> e <strong>foco.html</strong> estão guardados na mesma pasta que este ficheiro no seu repositório do GitHub.
      </p>
    </div>
    
    <!-- Iframe que carrega os outros ficheiros html -->
    <iframe 
      id="app-frame" 
      src="gestao.html" 
      class="w-full h-full border-none relative z-10 fade-out" 
      title="Visualizador de Aplicações" 
      onload="handleIframeLoad()">
    </iframe>
    
  </main>

  <script>
    /**
     * Função para alternar entre as aplicações
     */
    function loadApp(file, btn) {
      const frame = document.getElementById('app-frame');
      const loader = document.getElementById('loader');
      
      // Mostrar estado de carregamento
      loader.style.display = 'flex';
      frame.classList.remove('fade-in');
      frame.classList.add('fade-out');
      
      // Pequeno atraso para a animação ser visível
      setTimeout(() => {
        frame.src = file;
      }, 150);
      
      // Reset de estilos de todos os botões
      document.querySelectorAll('.nav-btn').forEach(b => {
        b.classList.remove('bg-blue-50', 'text-blue-700', 'active', 'shadow-sm', 'border-blue-100');
        b.classList.add('text-slate-500', 'hover:bg-slate-50', 'hover:text-slate-900', 'border-transparent');
      });
      
      // Aplicar estilo de ativo ao botão clicado
      btn.classList.remove('text-slate-500', 'hover:bg-slate-50', 'hover:text-slate-900', 'border-transparent');
      btn.classList.add('bg-blue-50', 'text-blue-700', 'active', 'shadow-sm', 'border-blue-100');
    }

    /**
     * Função executada quando o iframe termina de carregar
     */
    function handleIframeLoad() {
      const frame = document.getElementById('app-frame');
      const loader = document.getElementById('loader');
      const fallback = document.getElementById('fallback-msg');
      
      // Ocultar loader e mostrar iframe com animação
      loader.style.display = 'none';
      frame.classList.remove('fade-out');
      frame.classList.add('fade-in');

      // Verificação simples para detetar se falhou a carregar (ex: ao testar sem os outros ficheiros)
      try {
        // Se conseguirmos aceder ao document do iframe, e ele estiver vazio/erro, mostramos o fallback
        // Nota: Isto pode dar erro de CORS em alguns ambientes locais, o que é normal.
        const frameDoc = frame.contentDocument || frame.contentWindow.document;
        if (frameDoc.body.innerHTML.trim() === '' || frameDoc.title === 'Error') {
          fallback.style.display = 'flex';
          frame.style.opacity = '0';
        } else {
          fallback.style.display = 'none';
        }
      } catch (e) {
        // Ignorar erros de CORS ao testar localmente com file://
        console.log("A executar em ambiente restrito ou os ficheiros estão alojados corretamente no GitHub.");
      }
    }
  </script>
</body>
</html>
